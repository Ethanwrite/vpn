components:
  schemas:
    AdminOrderAction:
      properties:
        reviewed_by:
          type: string
          title: Reviewed By
          default: admin
        note:
          anyOf:
          - type: string
          - type: 'null'
          title: Note
      type: object
      title: AdminOrderAction
    AdminPaymentSettingRequest:
      properties:
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        qr_url:
          type: string
          title: Qr Url
        enabled:
          type: boolean
          title: Enabled
          default: true
      type: object
      required:
      - qr_url
      title: AdminPaymentSettingRequest
    AdminPromotionRequest:
      properties:
        id:
          anyOf:
          - type: string
          - type: 'null'
          title: Id
        name:
          type: string
          title: Name
        tag:
          type: string
          title: Tag
          default: 限时特惠
        plan_id:
          type: string
          title: Plan Id
          default: plan_month
        starts_at:
          type: string
          format: date-time
          title: Starts At
        ends_at:
          type: string
          format: date-time
          title: Ends At
        promo_price_cents:
          type: integer
          title: Promo Price Cents
        invite_extra_discount_cents:
          type: integer
          title: Invite Extra Discount Cents
          default: 0
        stackable:
          type: boolean
          title: Stackable
          default: false
        new_user_only:
          type: boolean
          title: New User Only
          default: false
        countdown_enabled:
          type: boolean
          title: Countdown Enabled
          default: true
        status:
          type: string
          title: Status
          default: active
      type: object
      required:
      - name
      - starts_at
      - ends_at
      - promo_price_cents
      title: AdminPromotionRequest
    AdminUserSummary:
      properties:
        id:
          type: string
          title: Id
        email:
          type: string
          title: Email
        created_at:
          type: string
          format: date-time
          title: Created At
        vip_status:
          type: string
          title: Vip Status
        vip_expired_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Vip Expired At
        last_login_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Login At
        last_seen_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Seen At
        online:
          type: boolean
          title: Online
      type: object
      required:
      - id
      - email
      - created_at
      - vip_status
      - online
      title: AdminUserSummary
    AuthRequest:
      properties:
        email:
          type: string
          title: Email
        password:
          type: string
          title: Password
        invite_code:
          anyOf:
          - type: string
          - type: 'null'
          title: Invite Code
      type: object
      required:
      - email
      - password
      title: AuthRequest
    AuthResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          title: Token Type
          default: bearer
        user:
          $ref: '#/components/schemas/User'
      type: object
      required:
      - access_token
      - user
      title: AuthResponse
    CreateOrderRequest:
      properties:
        plan_id:
          type: string
          title: Plan Id
        promotion_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Promotion Id
        pay_channel:
          $ref: '#/components/schemas/PayChannel'
        user_id:
          anyOf:
          - type: string
          - type: 'null'
          title: User Id
        invite_code:
          anyOf:
          - type: string
          - type: 'null'
          title: Invite Code
      type: object
      required:
      - plan_id
      - pay_channel
      title: CreateOrderRequest
    CreateWithdrawalRequest:
      properties:
        amount_cents:
          type: integer
          title: Amount Cents
        account_type:
          type: string
          title: Account Type
          default: alipay
        account_masked:
          type: string
          title: Account Masked
      type: object
      required:
      - amount_cents
      - account_masked
      title: CreateWithdrawalRequest
    DashboardSummary:
      properties:
        total_users:
          type: integer
          title: Total Users
        today_new_users:
          type: integer
          title: Today New Users
        online_users:
          type: integer
          title: Online Users
        vip_users:
          type: integer
          title: Vip Users
        expiring_soon_users:
          type: integer
          title: Expiring Soon Users
        total_orders:
          type: integer
          title: Total Orders
        pending_confirm_orders:
          type: integer
          title: Pending Confirm Orders
        completed_orders:
